<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Arcade Hub</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f172a;
  color:white;
  overflow:hidden;
}

/* MENU */
#menu{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0f172a,#1e293b);
}

.btn{
  width:240px;
  padding:12px;
  margin:8px;
  border:none;
  border-radius:12px;
  color:white;
  font-size:15px;
}

.g1{background:#22c55e;}
.g2{background:#3b82f6;}
.g3{background:#f97316;}
.g4{background:#a855f7;}

#game{display:none;}

canvas{
  width:100vw;
  height:100vh;
  display:block;
}

/* GAME OVER */
#gameover{
  display:none;
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}
#gameover button{
  padding:10px 20px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
}

/* CONTROLES MOVIL */
#controls{
  position:absolute;
  bottom:20px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:10px;
}

.ctrl{
  width:60px;
  height:60px;
  border-radius:50%;
  background:rgba(255,255,255,0.2);
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:20px;
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu">
  <h1>🎮 ARCADE HUB</h1>
  <button class="btn g1" onclick="start(1)">Esquiva Enemigos</button>
  <button class="btn g2" onclick="start(2)">Monedas</button>
  <button class="btn g3" onclick="start(3)">Snake</button>
  <button class="btn g4" onclick="start(4)">🚀 Luna (3 min)</button>
</div>

<!-- GAME -->
<div id="game">
  <canvas id="c"></canvas>

  <!-- controles móvil -->
  <div id="controls">
    <div class="ctrl" ontouchstart="keys.w=true" ontouchend="keys.w=false">⬆</div>
    <div class="ctrl" ontouchstart="keys.a=true" ontouchend="keys.a=false">⬅</div>
    <div class="ctrl" ontouchstart="keys.s=true" ontouchend="keys.s=false">⬇</div>
    <div class="ctrl" ontouchstart="keys.d=true" ontouchend="keys.d=false">➡</div>
  </div>

  <div id="gameover">
    <h1>💀 GAME OVER</h1>
    <p id="txt"></p>
    <button onclick="location.reload()">Aceptar</button>
  </div>
</div>

<script>

let c=document.getElementById("c");
let ctx=c.getContext("2d");

function resize(){
  c.width=innerWidth;
  c.height=innerHeight;
}
window.addEventListener("resize",resize);

let keys={};
document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

/* GAME OVER */
function over(t){
  document.getElementById("gameover").style.display="flex";
  document.getElementById("txt").innerText=t;
}

/* MENU */
function start(g){
  document.getElementById("menu").style.display="none";
  document.getElementById("game").style.display="block";
  resize();

  if(g===1) g1();
  if(g===2) g2();
  if(g===3) g3();
  if(g===4) g4();
}

/* ================= GAME 1 ================= */
function g1(){
let p={x:100,y:100},e=[];

function loop(){
ctx.fillStyle="#0f172a";ctx.fillRect(0,0,c.width,c.height);

if(keys.w)p.y-=5;
if(keys.s)p.y+=5;
if(keys.a)p.x-=5;
if(keys.d)p.x+=5;

ctx.fillStyle="green";
ctx.fillRect(p.x,p.y,20,20);

if(Math.random()<0.03)e.push({x:Math.random()*c.width,y:0});

ctx.fillStyle="red";
for(let i=0;i<e.length;i++){
e[i].y+=4;
ctx.fillRect(e[i].x,e[i].y,20,20);

if(Math.abs(e[i].x-p.x)<20&&Math.abs(e[i].y-p.y)<20){
over("Te eliminaron");
return;
}}
requestAnimationFrame(loop);
}
loop();
}

/* ================= GAME 2 ================= */
function g2(){
let p={x:100,y:100},cns=[],score=0;

function loop(){
ctx.fillStyle="#020617";ctx.fillRect(0,0,c.width,c.height);

if(keys.w)p.y-=5;
if(keys.s)p.y+=5;
if(keys.a)p.x-=5;
if(keys.d)p.x+=5;

ctx.fillStyle="blue";
ctx.fillRect(p.x,p.y,20,20);

if(Math.random()<0.05)cns.push({x:Math.random()*c.width,y:Math.random()*c.height});

for(let i=0;i<cns.length;i++){
ctx.fillStyle="yellow";
ctx.beginPath();
ctx.arc(cns[i].x,cns[i].y,8,0,Math.PI*2);
ctx.fill();

if(Math.abs(cns[i].x-p.x)<20&&Math.abs(cns[i].y-p.y)<20){
cns.splice(i,1);score+=10;
}}

requestAnimationFrame(loop);
}
loop();
}

/* ================= GAME 3 ================= */
function g3(){
let s=[{x:100,y:100}],d="r";

document.onkeydown=e=>{
if(e.key==="ArrowUp")d="u";
if(e.key==="ArrowDown")d="d";
if(e.key==="ArrowLeft")d="l";
if(e.key==="ArrowRight")d="r";
};

function loop(){
ctx.fillStyle="#111";ctx.fillRect(0,0,c.width,c.height);

let h={...s[0]};
if(d==="r")h.x+=10;
if(d==="l")h.x-=10;
if(d==="u")h.y-=10;
if(d==="d")h.y+=10;

s.unshift(h);s.pop();

ctx.fillStyle="lime";
s.forEach(a=>ctx.fillRect(a.x,a.y,10,10));

requestAnimationFrame(loop);
}
loop();
}

/* ================= GAME 4 (LUNA PRO) ================= */
function g4(){

let r={x:200,y:500,vy:0};
let fuel=100;
let obs=[],met=[];
let dist=0;

function loop(){
ctx.fillStyle="#000";ctx.fillRect(0,0,c.width,c.height);

dist++;

if(Math.random()<0.07)obs.push({x:Math.random()*c.width,y:-50});
if(Math.random()<0.1)met.push({x:Math.random()*c.width,y:-50,vy:3});

if(keys.w&&fuel>0){r.vy-=0.3;fuel-=0.2;}
if(keys.a)r.x-=5;
if(keys.d)r.x+=5;

r.vy+=0.05;r.y+=r.vy;

ctx.fillStyle="orange";
ctx.fillRect(r.x,r.y,20,40);

/* obstaculos */
ctx.fillStyle="red";
for(let i=0;i<obs.length;i++){
obs[i].y+=3;
ctx.fillRect(obs[i].x,obs[i].y,40,40);

if(Math.abs(obs[i].x-r.x)<30&&Math.abs(obs[i].y-r.y)<40){
over("💥 Choque");
return;
}}

/* meteoritos */
ctx.fillStyle="white";
for(let i=0;i<met.length;i++){
met[i].y+=met[i].vy;
ctx.beginPath();
ctx.arc(met[i].x,met[i].y,6,0,Math.PI*2);
ctx.fill();

if(Math.abs(met[i].x-r.x)<20&&Math.abs(met[i].y-r.y)<40){
over("☄️ Impacto");
return;
}}

/* victoria */
if(dist>5000){
over("🌙 Llegaste a la Luna");
return;
}

requestAnimationFrame(loop);
}
loop();
}

</script>
</body>
</html>
