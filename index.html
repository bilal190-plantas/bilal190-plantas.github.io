<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Game Hub 3D</title>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
  overflow: hidden;
}

/* MENU PRINCIPAL */
.menu {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: linear-gradient(120deg, #0f172a, #1e293b);
}

h1 {
  font-size: 26px;
  margin-bottom: 20px;
}

.btn {
  width: 220px;
  padding: 12px;
  margin: 8px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  font-size: 15px;
  transition: 0.2s;
  color: white;
}

.btn:hover {
  transform: scale(1.05);
}

.g1 { background: linear-gradient(90deg,#22c55e,#16a34a); }
.g2 { background: linear-gradient(90deg,#3b82f6,#1d4ed8); }
.g3 { background: linear-gradient(90deg,#f97316,#ef4444); }

/* JUEGO */
.game {
  display: none;
  width: 100%;
  height: 100%;
}

canvas {
  width: 100%;
  height: 100%;
  display: block;
}

.back {
  position: absolute;
  top: 10px;
  left: 10px;
  padding: 8px 12px;
  border: none;
  border-radius: 8px;
  background: rgba(255,255,255,0.2);
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- MENU -->
<div class="menu" id="menu">
  <h1>🎮 GAME HUB 3D</h1>
  <button class="btn g1" onclick="startGame(1)">Juego 1 - Neon Runner</button>
  <button class="btn g2" onclick="startGame(2)">Juego 2 - Cube Jump</button>
  <button class="btn g3" onclick="startGame(3)">Juego 3 - Space Orbit</button>
</div>

<!-- JUEGO -->
<div class="game" id="game">
  <button class="back" onclick="backMenu()">← Menu</button>
  <canvas id="canvas"></canvas>
</div>

<script>

let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);

/* MENU */
function startGame(n){
  document.getElementById("menu").style.display = "none";
  document.getElementById("game").style.display = "block";
  resize();
  if(n===1) game1();
  if(n===2) game2();
  if(n===3) game3();
}

function backMenu(){
  document.getElementById("menu").style.display = "flex";
  document.getElementById("game").style.display = "none";
}

/* ===== JUEGO 1: NEON RUNNER ===== */
function game1(){
  let x = 100;

  function loop(){
    ctx.fillStyle = "#0f172a";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    x += 5;
    if(x > canvas.width) x = 0;

    ctx.fillStyle = "#22c55e";
    ctx.fillRect(x, canvas.height/2, 60, 60);

    requestAnimationFrame(loop);
  }
  loop();
}

/* ===== JUEGO 2: CUBE JUMP ===== */
function game2(){
  let y = 200;
  let vel = 0;

  document.onkeydown = (e)=>{
    if(e.key===" "){
      vel = -10;
    }
  };

  function loop(){
    ctx.fillStyle = "#020617";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    vel += 0.5;
    y += vel;

    if(y > canvas.height - 100){
      y = canvas.height - 100;
      vel = 0;
    }

    ctx.fillStyle = "#3b82f6";
    ctx.fillRect(200, y, 50, 50);

    requestAnimationFrame(loop);
  }
  loop();
}

/* ===== JUEGO 3: SPACE ORBIT ===== */
function game3(){
  let angle = 0;

  function loop(){
    ctx.fillStyle = "#000";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    let cx = canvas.width/2;
    let cy = canvas.height/2;

    let x = cx + Math.cos(angle)*150;
    let y = cy + Math.sin(angle)*150;

    angle += 0.02;

    ctx.fillStyle = "#f97316";
    ctx.beginPath();
    ctx.arc(x,y,30,0,Math.PI*2);
    ctx.fill();

    requestAnimationFrame(loop);
  }
  loop();
}

</script>

</body>
</html>
