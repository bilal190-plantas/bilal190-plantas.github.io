<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>🕹 Arcade Hub</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#07071a;font-family:system-ui,sans-serif;color:#fff;touch-action:none;}

/* ═══════════ MENU ═══════════ */
#menu{
  position:absolute;inset:0;display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  background:radial-gradient(ellipse at 50% 38%,#1a1050 0%,#07071a 68%);
  padding:env(safe-area-inset-top,0) 0 env(safe-area-inset-bottom,0);
}
.stars-bg{position:absolute;inset:0;overflow:hidden;pointer-events:none;}
.star{position:absolute;background:#fff;border-radius:50%;}
@keyframes twinkle{from{opacity:.1}to{opacity:1}}
@keyframes floatIcon{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

.menu-title{
  font-size:clamp(26px,7vw,52px);font-weight:900;letter-spacing:4px;
  background:linear-gradient(135deg,#c084fc,#818cf8,#38bdf8);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 24px rgba(140,100,255,.5));
  margin-bottom:4px;animation:fadeSlideIn .5s ease both;
}
.menu-sub{font-size:clamp(9px,2vw,11px);color:rgba(255,255,255,.3);letter-spacing:6px;text-transform:uppercase;margin-bottom:clamp(20px,4vh,38px);animation:fadeSlideIn .6s ease both;}

.game-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:clamp(8px,2vw,14px);
  width:min(92vw,420px);
  animation:fadeSlideIn .7s ease both;
}
.game-btn{
  padding:clamp(14px,3vh,22px) 12px clamp(10px,2.5vh,16px);
  border:none;border-radius:20px;color:#fff;
  cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;
  position:relative;overflow:hidden;
  transition:transform .14s,box-shadow .14s;
  border:1px solid rgba(255,255,255,.1);
  -webkit-touch-callout:none;
}
.game-btn:active{transform:scale(.93)!important;}
.game-btn .icon{font-size:clamp(26px,5vw,36px);animation:floatIcon 3s ease-in-out infinite;}
.game-btn .name{font-size:clamp(11px,2.5vw,13px);font-weight:800;letter-spacing:1px;}
.game-btn .best{font-size:clamp(9px,1.8vw,10px);opacity:.45;margin-top:-2px;}
.g1{background:linear-gradient(140deg,#16a34a,#052e16);box-shadow:0 8px 28px rgba(34,197,94,.25);}
.g2{background:linear-gradient(140deg,#1d4ed8,#0c1a6e);box-shadow:0 8px 28px rgba(59,130,246,.25);}
.g3{background:linear-gradient(140deg,#c2410c,#7c1d06);box-shadow:0 8px 28px rgba(249,115,22,.25);}
.g4{background:linear-gradient(140deg,#7c3aed,#3b0764);box-shadow:0 8px 28px rgba(168,85,247,.25);}
.g1:hover{box-shadow:0 14px 36px rgba(34,197,94,.4);}
.g2:hover{box-shadow:0 14px 36px rgba(59,130,246,.4);}
.g3:hover{box-shadow:0 14px 36px rgba(249,115,22,.4);}
.g4:hover{box-shadow:0 14px 36px rgba(168,85,247,.4);}
.mobile-hint{font-size:clamp(9px,2vw,10px);color:rgba(255,255,255,.2);margin-top:14px;letter-spacing:1.5px;text-align:center;}

/* ═══════════ GAME SHELL ═══════════ */
#game{display:none;position:absolute;inset:0;}
canvas{position:absolute;inset:0;width:100%;height:100%;}

/* HUD */
#hud{
  position:absolute;top:0;left:0;right:0;
  padding:clamp(6px,2vw,10px) clamp(8px,2vw,14px);
  padding-top:max(env(safe-area-inset-top,6px),6px);
  display:flex;align-items:center;gap:6px;
  pointer-events:none;z-index:10;
}
.hpill{
  background:rgba(0,0,0,.65);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.1);border-radius:999px;
  padding:4px 12px;font-size:clamp(11px,3vw,14px);font-weight:700;white-space:nowrap;
}
.hpill-score{color:#fbbf24;}
#hudExtra{font-size:clamp(10px,2.5vw,13px);}
.hbk{
  pointer-events:all;cursor:pointer;
  font-size:clamp(10px,2.5vw,12px);color:rgba(255,255,255,.5);
  padding:4px 12px;border-radius:999px;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);
  margin-left:auto;transition:background .15s;white-space:nowrap;
}
.hbk:active{background:rgba(255,255,255,.2);}

/* ═══ JOYSTICK (left side) ═══ */
#joystickZone{
  position:absolute;bottom:clamp(14px,4vw,24px);left:clamp(12px,3vw,20px);
  width:clamp(110px,22vw,150px);height:clamp(110px,22vw,150px);
  pointer-events:all;z-index:10;
  display:flex;align-items:center;justify-content:center;
}
#joystickBase{
  width:100%;height:100%;border-radius:50%;
  background:rgba(255,255,255,.06);
  border:2px solid rgba(255,255,255,.14);
  position:relative;
}
#joystickKnob{
  position:absolute;
  width:42%;height:42%;
  border-radius:50%;
  background:radial-gradient(circle at 35% 35%,rgba(255,255,255,.45),rgba(255,255,255,.12));
  border:2px solid rgba(255,255,255,.3);
  box-shadow:0 4px 16px rgba(0,0,0,.4);
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  transition:none;
  pointer-events:none;
}

/* ═══ ACTION BUTTONS (right side) ═══ */
#actionZone{
  position:absolute;bottom:clamp(14px,4vw,24px);right:clamp(12px,3vw,20px);
  display:flex;flex-direction:column;gap:clamp(8px,2vw,12px);
  pointer-events:all;z-index:10;
  align-items:center;
}
.abtn{
  width:clamp(52px,12vw,68px);height:clamp(52px,12vw,68px);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:clamp(18px,4vw,24px);
  border:2px solid rgba(255,255,255,.2);
  background:rgba(255,255,255,.1);
  backdrop-filter:blur(8px);
  cursor:pointer;user-select:none;
  transition:transform .08s,background .08s;
  -webkit-touch-callout:none;
}
.abtn:active,.abtn.pressed{background:rgba(255,255,255,.32);transform:scale(.92);}

/* ═══ SNAKE special: swipe arrows overlay ═══ */
#snakeControls{
  display:none;position:absolute;inset:0;z-index:9;pointer-events:all;
}
/* four tap zones */
.sz{position:absolute;display:flex;align-items:center;justify-content:center;}
.sz-t{top:0;left:25%;width:50%;height:25%;}
.sz-b{bottom:0;left:25%;width:50%;height:25%;}
.sz-l{top:25%;left:0;width:25%;height:50%;}
.sz-r{top:25%;right:0;width:25%;height:50%;}
.sz-arrow{
  font-size:clamp(22px,5vw,32px);color:rgba(255,255,255,.18);
  pointer-events:none;user-select:none;
}

/* ═══ GAME OVER ═══ */
#gameover{
  display:none;position:absolute;inset:0;z-index:20;
  background:rgba(0,0,0,.92);backdrop-filter:blur(16px);
  flex-direction:column;align-items:center;justify-content:center;gap:12px;
  padding:20px;
}
.go-title{font-size:clamp(24px,6vw,44px);font-weight:900;text-align:center;}
.go-score{font-size:clamp(14px,3.5vw,18px);color:rgba(255,255,255,.65);text-align:center;}
.go-best{font-size:clamp(12px,3vw,15px);color:#fbbf24;font-weight:700;}
.go-btn{
  padding:clamp(10px,2.5vw,14px) clamp(24px,5vw,36px);
  border:none;border-radius:14px;
  background:linear-gradient(135deg,#6d28d9,#a855f7);color:#fff;
  font-size:clamp(14px,3.5vw,17px);font-weight:700;cursor:pointer;
  box-shadow:0 6px 22px rgba(168,85,247,.4);
}
.go-btn:active{transform:scale(.95);}
.go-sec{
  padding:8px 20px;border:1px solid rgba(255,255,255,.18);border-radius:10px;
  background:transparent;color:rgba(255,255,255,.6);
  font-size:clamp(12px,3vw,14px);cursor:pointer;
}

/* ═══ PHASE BANNER ═══ */
#phaseBanner{
  display:none;position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);z-index:15;
  background:rgba(0,0,0,.82);border:1px solid rgba(255,255,255,.18);
  border-radius:16px;padding:14px 28px;text-align:center;pointer-events:none;
}
@keyframes phasePop{0%{opacity:0;transform:translate(-50%,-60%)}15%{opacity:1;transform:translate(-50%,-50%)}75%{opacity:1}100%{opacity:0;transform:translate(-50%,-50%)}}
#phaseBanner.show{display:block;animation:phasePop 2.8s forwards;}

/* ═══ LUNA custom HUD ═══ */
#lunaHUD{
  display:none;position:absolute;top:0;left:0;right:0;
  padding:clamp(6px,2vw,10px) clamp(8px,2vw,12px);
  padding-top:max(env(safe-area-inset-top,6px),6px);
  flex-wrap:wrap;gap:5px;pointer-events:none;z-index:10;
}
.lhp{
  background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.1);
  border-radius:999px;padding:4px 12px;font-size:clamp(10px,2.5vw,12px);
}
.lhp-label{color:rgba(255,255,255,.4);font-size:clamp(7px,1.8vw,9px);letter-spacing:1px;text-transform:uppercase;}
.lhp-val{font-weight:700;font-size:clamp(12px,3vw,15px);}
#lFuelWrap{height:5px;background:rgba(255,255,255,.1);border-radius:3px;margin-top:2px;overflow:hidden;min-width:60px;}
#lFuelBar{height:100%;background:#22c55e;border-radius:3px;width:100%;}
#lunaLog{
  display:none;position:absolute;z-index:10;
  background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.1);
  border-radius:14px;padding:8px 11px;font-size:clamp(9px,2vw,11px);
  pointer-events:none;
}
</style>
</head>
<body>

<!-- ════════════ MENU ════════════ -->
<div id="menu">
  <div class="stars-bg" id="starsContainer"></div>
  <div class="menu-title">🕹 ARCADE HUB</div>
  <div class="menu-sub">Elige tu desafío</div>
  <div class="game-grid">
    <button class="game-btn g1" onclick="startGame(1)">
      <span class="icon">👾</span><span class="name">ESQUIVA</span><span class="best" id="best1">—</span>
    </button>
    <button class="game-btn g2" onclick="startGame(2)">
      <span class="icon">🪙</span><span class="name">MONEDAS</span><span class="best" id="best2">—</span>
    </button>
    <button class="game-btn g3" onclick="startGame(3)">
      <span class="icon">🐍</span><span class="name">SNAKE+</span><span class="best" id="best3">—</span>
    </button>
    <button class="game-btn g4" onclick="startGame(4)">
      <span class="icon">🚀</span><span class="name">LUNA 2047</span><span class="best" id="best4">—</span>
    </button>
  </div>
  <div class="mobile-hint" id="mobileHint"></div>
</div>

<!-- ════════════ GAME SHELL ════════════ -->
<div id="game">
  <canvas id="c"></canvas>

  <!-- HUD bar -->
  <div id="hud">
    <div class="hpill hpill-score" id="hudScore">⭐ 0</div>
    <div class="hpill" id="hudExtra"></div>
    <div class="hbk" onclick="goMenu()">✕ Menú</div>
  </div>

  <!-- Joystick (hidden for snake, shown for others) -->
  <div id="joystickZone">
    <div id="joystickBase"><div id="joystickKnob"></div></div>
  </div>

  <!-- Action buttons -->
  <div id="actionZone"></div>

  <!-- Snake swipe zones -->
  <div id="snakeControls">
    <div class="sz sz-t" id="sz-up"><div class="sz-arrow">▲</div></div>
    <div class="sz sz-b" id="sz-down"><div class="sz-arrow">▼</div></div>
    <div class="sz sz-l" id="sz-left"><div class="sz-arrow">◀</div></div>
    <div class="sz sz-r" id="sz-right"><div class="sz-arrow">▶</div></div>
  </div>

  <!-- Luna HUD -->
  <div id="lunaHUD">
    <div class="lhp">
      <div class="lhp-label">FUEL</div>
      <div class="lhp-val" id="lFuel">100%</div>
      <div id="lFuelWrap"><div id="lFuelBar"></div></div>
    </div>
    <div class="lhp"><div class="lhp-label">ALT</div><div class="lhp-val" id="lAlt">0 km</div></div>
    <div class="lhp"><div class="lhp-label">VEL</div><div class="lhp-val" id="lSpd">0</div></div>
    <div class="lhp"><div class="lhp-label">TIEMPO</div><div class="lhp-val" id="lTime">3:00</div></div>
    <div class="lhp" style="flex:1;min-width:80px;"><div class="lhp-label">FASE</div><div class="lhp-val" id="lPhase">—</div></div>
    <div class="lhp"><div class="lhp-label">PTS</div><div class="lhp-val" style="color:#fbbf24" id="lScore">0</div></div>
  </div>
  <div id="lunaLog"></div>

  <!-- Phase banner -->
  <div id="phaseBanner"></div>

  <!-- Game Over -->
  <div id="gameover">
    <div class="go-title" id="goTitle">GAME OVER</div>
    <div class="go-score" id="goScore"></div>
    <div class="go-best" id="goBest"></div>
    <button class="go-btn" onclick="restartGame()">▶ Reintentar</button>
    <button class="go-sec" onclick="goMenu()">Menú principal</button>
  </div>
</div>

<script>
// ══════════════════════════════════════
//  GLOBALS
// ══════════════════════════════════════
const C=document.getElementById('c'),ctx=C.getContext('2d');
let W,H,currentGame=null,animFrame=null;
const isMobile=('ontouchstart' in window)||navigator.maxTouchPoints>0;

// Detect and show hint
document.getElementById('mobileHint').textContent=
  isMobile?'Joystick izquierdo · Botones derecha':'WASD / Flechas · ESC = menú';

// resize
function resize(){
  W=C.width=innerWidth;
  H=C.height=innerHeight;
  repositionUI();
}
window.addEventListener('resize',resize);

function repositionUI(){
  const llog=document.getElementById('lunaLog');
  if(llog.style.display!=='none'){
    llog.style.right='10px';
    llog.style.bottom=(H<500?'190px':'210px');
    llog.style.width=W<400?'150px':'185px';
  }
}

// ── Stars ──
const sc=document.getElementById('starsContainer');
for(let i=0;i<100;i++){
  const s=document.createElement('div');s.className='star';
  const sz=Math.random()*2.5+.5;
  s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;opacity:${Math.random()*.8+.2};animation:twinkle ${Math.random()*3+2}s ease-in-out infinite alternate;`;
  sc.appendChild(s);
}

// ── Bests ──
function loadBests(){
  for(let i=1;i<=4;i++){
    const b=localStorage.getItem('best_'+i);
    document.getElementById('best'+i).textContent=b?'Récord: '+b:'Récord: —';
  }
}
loadBests();

// ── Keyboard ──
const keys={};
document.addEventListener('keydown',e=>{
  keys[e.key.toLowerCase()]=true;
  if([' ','arrowup','arrowdown','arrowleft','arrowright'].includes(e.key.toLowerCase()))e.preventDefault();
  if(e.key==='Escape')goMenu();
});
document.addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);

// ══════════════════════════════════════
//  JOYSTICK
// ══════════════════════════════════════
const jBase=document.getElementById('joystickBase');
const jKnob=document.getElementById('joystickKnob');
let jActive=false,jTouchId=null;
const joystick={x:0,y:0}; // normalised -1..1

function jPos(touch){
  const r=jBase.getBoundingClientRect();
  const cx=r.left+r.width/2,cy=r.top+r.height/2;
  const maxR=r.width/2*.72;
  let dx=touch.clientX-cx,dy=touch.clientY-cy;
  const dist=Math.hypot(dx,dy);
  if(dist>maxR){dx=dx/dist*maxR;dy=dy/dist*maxR;}
  joystick.x=dx/maxR;joystick.y=dy/maxR;
  jKnob.style.transform=`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px))`;
}
function jReset(){
  jActive=false;jTouchId=null;joystick.x=0;joystick.y=0;
  jKnob.style.transform='translate(-50%,-50%)';
}

document.getElementById('joystickZone').addEventListener('touchstart',e=>{
  e.preventDefault();
  if(jActive)return;
  jActive=true;jTouchId=e.changedTouches[0].identifier;
  jPos(e.changedTouches[0]);
},{passive:false});

document.addEventListener('touchmove',e=>{
  if(!jActive)return;
  for(const t of e.changedTouches){if(t.identifier===jTouchId){jPos(t);break;}}
},{passive:false});

document.addEventListener('touchend',e=>{
  for(const t of e.changedTouches){if(t.identifier===jTouchId){jReset();break;}}
});
document.addEventListener('touchcancel',e=>{
  for(const t of e.changedTouches){if(t.identifier===jTouchId){jReset();break;}}
});

// axis helpers (combines keyboard + joystick)
function axisX(){
  if(keys.a||keys.arrowleft)return -1;
  if(keys.d||keys.arrowright)return 1;
  return joystick.x;
}
function axisY(){
  if(keys.w||keys.arrowup)return -1;
  if(keys.s||keys.arrowdown)return 1;
  return joystick.y;
}
function btnHeld(k){return keys[k]||false;}

// ── Action button factory ──
function makeABtn(icon,key,color,borderColor){
  const b=document.createElement('div');b.className='abtn';
  b.textContent=icon;
  if(color)b.style.background=color;
  if(borderColor)b.style.borderColor=borderColor;
  const on=()=>{keys[key]=true;b.classList.add('pressed');};
  const off=()=>{keys[key]=false;b.classList.remove('pressed');};
  b.addEventListener('touchstart',e=>{e.preventDefault();on();},{passive:false});
  b.addEventListener('touchend',e=>{e.preventDefault();off();},{passive:false});
  b.addEventListener('touchcancel',e=>{e.preventDefault();off();},{passive:false});
  b.addEventListener('mousedown',on);
  document.addEventListener('mouseup',off);
  document.getElementById('actionZone').appendChild(b);
  return b;
}

// ══════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════
function goMenu(){
  if(animFrame){cancelAnimationFrame(animFrame);animFrame=null;}
  cleanupLuna();
  document.getElementById('game').style.display='none';
  document.getElementById('menu').style.display='flex';
  document.getElementById('gameover').style.display='none';
  document.getElementById('snakeControls').style.display='none';
  document.getElementById('joystickZone').style.display='flex';
  document.getElementById('actionZone').innerHTML='';
  document.getElementById('hudScore').style.display='';
  document.getElementById('hudExtra').style.display='';
  loadBests();
}

function cleanupLuna(){
  document.getElementById('lunaHUD').style.display='none';
  document.getElementById('lunaLog').style.display='none';
  document.getElementById('phaseBanner').classList.remove('show');
  document.getElementById('hudScore').style.display='';
  document.getElementById('hudExtra').style.display='';
}

function gameOver(title,score,extra=''){
  if(animFrame){cancelAnimationFrame(animFrame);animFrame=null;}
  document.getElementById('goTitle').textContent=title;
  document.getElementById('goScore').textContent=extra||'Puntuación: '+score;
  const key='best_'+currentGame,best=parseInt(localStorage.getItem(key)||'0');
  if(score>best){localStorage.setItem(key,score);document.getElementById('goBest').textContent='🏆 ¡NUEVO RÉCORD!';}
  else document.getElementById('goBest').textContent='Récord: '+best;
  document.getElementById('gameover').style.display='flex';
}

function restartGame(){
  document.getElementById('gameover').style.display='none';
  cleanupLuna();
  if(animFrame){cancelAnimationFrame(animFrame);animFrame=null;}
  document.getElementById('actionZone').innerHTML='';
  startGame(currentGame);
}

function startGame(g){
  currentGame=g;
  document.getElementById('menu').style.display='none';
  document.getElementById('game').style.display='block';
  document.getElementById('gameover').style.display='none';
  document.getElementById('actionZone').innerHTML='';
  document.getElementById('snakeControls').style.display='none';
  document.getElementById('joystickZone').style.display='flex';
  cleanupLuna();
  resize();
  Object.keys(keys).forEach(k=>delete keys[k]);
  jReset();
  document.getElementById('hudScore').textContent='⭐ 0';
  document.getElementById('hudExtra').innerHTML='';
  if(g===1)g1();
  else if(g===2)g2();
  else if(g===3)g3();
  else g4();
}

// ══════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════
const rnd=(a,b)=>Math.random()*(b-a)+a;

function mkParts(x,y,col,n=10,spd=5){
  const ps=[];
  for(let i=0;i<n;i++){
    const a=rnd(0,Math.PI*2),s=rnd(1.5,spd);
    ps.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,col,sz:rnd(2,5)});
  }
  return ps;
}
function drawParts(ps){
  for(let i=ps.length-1;i>=0;i--){
    const p=ps[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=.12;p.life-=.03;
    if(p.life<=0){ps.splice(i,1);continue;}
    ctx.globalAlpha=p.life;ctx.fillStyle=p.col;
    ctx.beginPath();ctx.arc(p.x,p.y,p.sz*p.life,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
}

function drawShip(x,y,col,angle=0){
  ctx.save();ctx.translate(x,y);ctx.rotate(angle);
  ctx.fillStyle=col;
  ctx.beginPath();ctx.moveTo(0,-15);ctx.lineTo(12,12);ctx.lineTo(0,6);ctx.lineTo(-12,12);ctx.closePath();ctx.fill();
  ctx.fillStyle='rgba(180,230,255,.3)';ctx.beginPath();ctx.ellipse(0,-2,5,7,0,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function setScore(v){document.getElementById('hudScore').textContent='⭐ '+v;}
function setExtra(t){document.getElementById('hudExtra').innerHTML=t;}

// ══════════════════════════════════════
//  G1 — ESQUIVA  (Survivor)
// ══════════════════════════════════════
function g1(){
  let p={x:W/2,y:H*.65},parts=[],enemies=[],powerups=[];
  let score=0,shield=3,sTimer=0,combo=1,tick=0,invTimer=0;
  let speed=3,spawnR=60;
  const ECOLS=['#ef4444','#f97316','#eab308','#ec4899','#06b6d4','#a855f7'];

  // action button: nuke
  makeABtn('💣','z','rgba(239,68,68,.2)','#ef4444');

  function spawnEnemy(){
    const side=Math.floor(rnd(0,4));
    let ex,ey;
    if(side===0){ex=rnd(0,W);ey=-30;}
    else if(side===1){ex=W+30;ey=rnd(0,H);}
    else if(side===2){ex=rnd(0,W);ey=H+30;}
    else{ex=-30;ey=rnd(0,H);}
    const ang=Math.atan2(p.y-ey,p.x-ex),sp=speed*(rnd(.7,.6+.7));
    const r=rnd(10,20),hp=r>16?3:1;
    enemies.push({x:ex,y:ey,vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp,r,col:ECOLS[Math.floor(rnd(0,ECOLS.length))],hp,wobble:rnd(0,6.28),homing:tick>900});
  }

  function spawnPU(){
    const types=['shield','slow','nuke'];
    powerups.push({x:rnd(50,W-50),y:rnd(80,H-120),type:types[Math.floor(rnd(0,3))],pulse:0,ttl:360});
  }

  function nukeAll(){
    enemies.forEach(e=>parts.push(...mkParts(e.x,e.y,e.col,12)));
    enemies.length=0;score+=combo*60;setScore(Math.floor(score));
  }

  function loop(){
    animFrame=requestAnimationFrame(loop);
    ctx.fillStyle='rgba(7,7,26,.83)';ctx.fillRect(0,0,W,H);
    // grid
    ctx.strokeStyle='rgba(255,255,255,.022)';ctx.lineWidth=1;
    for(let x=0;x<W;x+=Math.floor(W/16)){{ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}}
    for(let y=0;y<H;y+=Math.floor(H/12)){{ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}}

    tick++;speed=3+tick/500;spawnR=Math.max(16,60-tick/45);
    if(tick%Math.floor(spawnR)===0)spawnEnemy();
    if(tick%480===0)spawnPU();

    // nuke button
    if(btnHeld('z')){keys['z']=false;nukeAll();}

    // movement via joystick
    const mv=invTimer>0?6.5:5;
    const ax=axisX(),ay=axisY();
    p.x+=ax*mv;p.y+=ay*mv;
    p.x=Math.max(14,Math.min(W-14,p.x));
    p.y=Math.max(50,Math.min(H-160,p.y));

    // trail
    if(tick%2===0)parts.push({x:p.x,y:p.y,vx:rnd(-.4,.4),vy:rnd(.2,.8),life:.3,col:'rgba(34,197,94,.6)',sz:3});

    // shields aura
    if(sTimer>0){
      sTimer--;
      ctx.strokeStyle=`rgba(56,189,248,${sTimer/160*.7})`;ctx.lineWidth=2.5;
      ctx.beginPath();ctx.arc(p.x,p.y,22,0,Math.PI*2);ctx.stroke();
    }
    if(invTimer>0){
      invTimer--;
      ctx.strokeStyle=`rgba(251,191,36,${.5+.4*Math.sin(tick*.2)})`;ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(p.x,p.y,26,0,Math.PI*2);ctx.stroke();
    }

    drawShip(p.x,p.y,'#22c55e');

    // powerups
    for(let i=powerups.length-1;i>=0;i--){
      const pw=powerups[i];pw.pulse+=.09;pw.ttl--;
      if(pw.ttl<=0){powerups.splice(i,1);continue;}
      const blink=pw.ttl<80&&Math.sin(tick*.2)<0;
      if(!blink){
        const c2={shield:'#38bdf8',nuke:'#f97316',slow:'#a78bfa'}[pw.type];
        const ic={shield:'🛡',nuke:'💥',slow:'❄️'}[pw.type];
        ctx.fillStyle=c2;ctx.globalAlpha=.18+.1*Math.sin(pw.pulse);
        ctx.beginPath();ctx.arc(pw.x,pw.y,22,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
        ctx.strokeStyle=c2;ctx.lineWidth=1.5;ctx.globalAlpha=.7;
        ctx.beginPath();ctx.arc(pw.x,pw.y,22,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1;
        ctx.font=`${Math.floor(W*.04)+10}px system-ui`;ctx.textAlign='center';ctx.fillText(ic,pw.x,pw.y+6);
      }
      if(Math.hypot(pw.x-p.x,pw.y-p.y)<28){
        parts.push(...mkParts(pw.x,pw.y,'#fff',14));
        if(pw.type==='shield'){shield=Math.min(5,shield+1);sTimer=160;}
        else if(pw.type==='nuke'){nukeAll();}
        else invTimer=220;
        powerups.splice(i,1);
      }
    }

    // enemies
    for(let i=enemies.length-1;i>=0;i--){
      const e=enemies[i];
      if(e.homing){const a=Math.atan2(p.y-e.y,p.x-e.x);e.vx=e.vx*.95+Math.cos(a)*.05*speed;e.vy=e.vy*.95+Math.sin(a)*.05*speed;}
      e.wobble+=.07;e.x+=e.vx;e.y+=e.vy;
      if(e.x<-80||e.x>W+80||e.y<-80||e.y>H+80){enemies.splice(i,1);continue;}
      const gl=ctx.createRadialGradient(e.x,e.y,0,e.x,e.y,e.r);
      gl.addColorStop(0,'rgba(255,255,255,.9)');gl.addColorStop(1,e.col);
      ctx.fillStyle=gl;ctx.beginPath();ctx.arc(e.x,e.y+Math.sin(e.wobble)*2,e.r,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle=e.col;ctx.lineWidth=1.5;ctx.globalAlpha=.7;ctx.stroke();ctx.globalAlpha=1;
      if(e.hp>1){
        ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(e.x-e.r,e.y-e.r-9,e.r*2,5);
        ctx.fillStyle='#22c55e';ctx.fillRect(e.x-e.r,e.y-e.r-9,e.r*2*(e.hp/3),5);
      }
      if(Math.hypot(e.x-p.x,e.y-p.y)<e.r+13){
        if(sTimer>0||invTimer>0){
          parts.push(...mkParts(e.x,e.y,e.col,12));
          e.hp--;if(e.hp<=0)enemies.splice(i,1);
          score+=5*combo;combo++;setScore(Math.floor(score));
        } else {
          parts.push(...mkParts(e.x,e.y,'#fff',20));
          enemies.splice(i,1);shield--;combo=1;
          if(shield<=0){gameOver('💥 Sin escudo',Math.floor(score));return;}
          sTimer=80;
        }
      }
    }

    drawParts(parts);
    score+=.025;setScore(Math.floor(score));
    setExtra(`❤️${shield} &nbsp;✖${combo} &nbsp;${powerups.length?'⚡':''}`);
  }
  loop();
}

// ══════════════════════════════════════
//  G2 — MONEDAS  (Collector+)
// ══════════════════════════════════════
function g2(){
  let p={x:W/2,y:H/2},parts=[],coins=[],gems=[],enemies=[],bombs=[];
  let score=0,lives=3,magnet=0,tick=0,mult=1,streak=0;
  let comboTexts=[];

  makeABtn('🧲','z','rgba(168,85,247,.2)','#a855f7');

  function loop(){
    animFrame=requestAnimationFrame(loop);
    ctx.fillStyle='rgba(2,5,22,.9)';ctx.fillRect(0,0,W,H);
    // hex bg
    ctx.strokeStyle='rgba(99,102,241,.04)';ctx.lineWidth=1;
    const HX=Math.floor(W/10);
    for(let row=0;row<H/HX+2;row++)
      for(let col=0;col<W/HX+2;col++){
        const ox=(row%2)*.5*HX,xb=col*HX+ox,yb=row*.75*HX;
        ctx.beginPath();
        for(let s=0;s<6;s++){const a=s*Math.PI/3;ctx.lineTo(xb+HX*.5*Math.cos(a),yb+HX*.5*Math.sin(a));}
        ctx.closePath();ctx.stroke();
      }

    tick++;
    const spd=5+mult*.2;
    const ax=axisX(),ay=axisY();
    p.x+=ax*spd;p.y+=ay*spd;
    p.x=Math.max(16,Math.min(W-16,p.x));
    p.y=Math.max(50,Math.min(H-160,p.y));

    if(tick%32===0)coins.push({x:rnd(28,W-28),y:rnd(70,H-140),pulse:rnd(0,6.28)});
    if(tick%130===0)gems.push({x:rnd(28,W-28),y:rnd(70,H-140),t:tick,type:Math.random()<.5?'magnet':'multi'});
    if(tick%170===0&&enemies.length<8)enemies.push({x:Math.random()<.5?-20:W+20,y:rnd(60,H-120),vx:0,vy:0,ph:rnd(0,6.28)});
    if(tick%280===0)bombs.push({x:rnd(60,W-60),y:rnd(80,H-140),life:220,r:18,armed:false});

    // manual magnet
    if(btnHeld('z')){keys['z']=false;magnet=Math.min(magnet+240,480);}

    const mr=magnet>0?240:28;

    // coins
    for(let i=coins.length-1;i>=0;i--){
      const c=coins[i];c.pulse+=.09;const sz=9+Math.sin(c.pulse)*2.2;
      if(mr>28){const dx=p.x-c.x,dy=p.y-c.y,d=Math.hypot(dx,dy);if(d<mr&&d>1){c.x+=dx/d*7;c.y+=dy/d*7;}}
      if(Math.hypot(c.x-p.x,c.y-p.y)<sz+14){
        streak++;mult=Math.min(8,1+Math.floor(streak/8));
        const pts=10*mult;score+=pts;setScore(score);
        comboTexts.push({x:c.x,y:c.y-10,label:'+'+pts,life:1,col:mult>3?'#f97316':mult>1?'#fbbf24':'#fff'});
        parts.push(...mkParts(c.x,c.y,'#fbbf24',7,4));
        coins.splice(i,1);continue;
      }
      ctx.save();ctx.translate(c.x,c.y);
      ctx.fillStyle='#fbbf24';ctx.shadowBlur=14;ctx.shadowColor='#fbbf24';
      ctx.beginPath();ctx.arc(0,0,sz,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
      ctx.fillStyle='rgba(255,230,100,.65)';ctx.beginPath();ctx.arc(-sz*.32,-sz*.32,sz*.32,0,Math.PI*2);ctx.fill();
      ctx.restore();
    }

    // gems
    for(let i=gems.length-1;i>=0;i--){
      const g=gems[i];const age=(tick-g.t)/60;
      if(Math.hypot(g.x-p.x,g.y-p.y)<22){
        parts.push(...mkParts(g.x,g.y,'#a78bfa',16,5));
        if(g.type==='magnet')magnet=400;else{mult=Math.min(8,mult+2);streak+=15;}
        gems.splice(i,1);continue;
      }
      const gc={magnet:'#a855f7',multi:'#f59e0b'}[g.type];
      ctx.save();ctx.translate(g.x,g.y);ctx.rotate(age*.8);
      ctx.fillStyle=gc;ctx.shadowBlur=18;ctx.shadowColor=gc;
      ctx.beginPath();for(let s=0;s<6;s++){const a=s*Math.PI/3;ctx.lineTo(Math.cos(a)*15,Math.sin(a)*15);}
      ctx.closePath();ctx.fill();ctx.shadowBlur=0;
      const ic={magnet:'🧲',multi:'✖'}[g.type];
      ctx.font='12px system-ui';ctx.textAlign='center';ctx.fillText(ic,0,5);
      ctx.restore();
    }

    // bombs
    for(let i=bombs.length-1;i>=0;i--){
      const b=bombs[i];b.life--;
      if(b.life<100)b.armed=true;
      if(b.life<=0){
        parts.push(...mkParts(b.x,b.y,'#ef4444',20,8));
        if(Math.hypot(b.x-p.x,b.y-p.y)<b.r+22){lives--;streak=0;mult=1;if(lives<=0){gameOver('💣 Explosión',score);return;}}
        bombs.splice(i,1);continue;
      }
      if(!b.armed&&Math.hypot(b.x-p.x,b.y-p.y)<b.r+16){
        parts.push(...mkParts(b.x,b.y,'#22c55e',10));score+=75;setScore(score);bombs.splice(i,1);continue;
      }
      const fuse=b.life/220;
      ctx.fillStyle=b.armed?`rgba(239,68,68,${.55+.4*Math.sin(tick*.2)})`:'#1f2937';
      ctx.strokeStyle=b.armed?'#ef4444':'#4b5563';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();ctx.stroke();
      ctx.font='18px system-ui';ctx.textAlign='center';ctx.fillText('💣',b.x,b.y+7);
      ctx.strokeStyle='#fbbf24';ctx.lineWidth=3;
      ctx.beginPath();ctx.arc(b.x,b.y,b.r+5,-Math.PI/2,-Math.PI/2+Math.PI*2*fuse);ctx.stroke();
    }

    // enemies
    for(let i=enemies.length-1;i>=0;i--){
      const e=enemies[i];e.ph+=.05;
      const ang=Math.atan2(p.y-e.y,p.x-e.x),spd2=1+score/2500;
      e.vx=e.vx*.88+Math.cos(ang)*.3*spd2;e.vy=e.vy*.88+Math.sin(ang)*.3*spd2;
      e.x+=e.vx+Math.cos(e.ph)*.4;e.y+=e.vy+Math.sin(e.ph*1.3)*.4;
      ctx.fillStyle='#ef4444';ctx.shadowBlur=8;ctx.shadowColor='#ef4444';
      ctx.beginPath();ctx.arc(e.x,e.y,15,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
      ctx.fillStyle='rgba(255,255,255,.22)';ctx.beginPath();ctx.arc(e.x-4,e.y-4,5,0,Math.PI*2);ctx.fill();
      if(Math.hypot(e.x-p.x,e.y-p.y)<28){
        parts.push(...mkParts(e.x,e.y,'#fff',14));enemies.splice(i,1);
        lives--;streak=0;mult=1;if(lives<=0){gameOver('💀 Sin vidas',score);return;}
      }
    }

    // combo float texts
    for(let i=comboTexts.length-1;i>=0;i--){
      const t=comboTexts[i];t.y-=1.4;t.life-=.025;
      if(t.life<=0){comboTexts.splice(i,1);continue;}
      ctx.globalAlpha=t.life;ctx.fillStyle=t.col;
      ctx.font=`bold ${12+Math.floor((1-t.life)*4)}px system-ui`;ctx.textAlign='center';
      ctx.fillText(t.label,t.x,t.y);
    }
    ctx.globalAlpha=1;

    if(magnet>0){
      magnet--;
      ctx.strokeStyle=`rgba(168,85,247,${.22+.12*Math.sin(tick*.08)})`;ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(p.x,p.y,240,0,Math.PI*2);ctx.stroke();
    }

    drawParts(parts);
    drawShip(p.x,p.y,'#3b82f6');
    setExtra(`❤️${lives} &nbsp;✖${mult} &nbsp;${magnet>0?'🧲':'　'}`);
  }
  loop();
}

// ══════════════════════════════════════
//  G3 — SNAKE+
// ══════════════════════════════════════
function g3(){
  const SZ=Math.max(16,Math.min(24,Math.floor(Math.min(W,H)/22)));
  const cols=Math.floor(W/SZ),rows=Math.floor(H/SZ);
  let snake=[{x:Math.floor(cols/2),y:Math.floor(rows/2)}];
  let dir={x:1,y:0},ndir={x:1,y:0};
  let food=null,bonus=null,shrink=null,portalA=null,portalB=null;
  let score=0,spd=7,tick=0,grow=0,parts=[],ghostMode=0;

  // hide joystick, show snake zones
  document.getElementById('joystickZone').style.display='none';
  document.getElementById('snakeControls').style.display='block';

  // Tap zones
  function tryDir(dx,dy){if((dx!==0&&dir.x===0)||(dy!==0&&dir.y===0))ndir={x:dx,y:dy};}
  document.getElementById('sz-up').addEventListener('touchstart',e=>{e.preventDefault();tryDir(0,-1);},{passive:false});
  document.getElementById('sz-down').addEventListener('touchstart',e=>{e.preventDefault();tryDir(0,1);},{passive:false});
  document.getElementById('sz-left').addEventListener('touchstart',e=>{e.preventDefault();tryDir(-1,0);},{passive:false});
  document.getElementById('sz-right').addEventListener('touchstart',e=>{e.preventDefault();tryDir(1,0);},{passive:false});

  // keyboard
  const origKD=document.onkeydown;
  document.onkeydown=e=>{
    const m={'ArrowUp':{x:0,y:-1},'ArrowDown':{x:0,y:1},'ArrowLeft':{x:-1,y:0},'ArrowRight':{x:1,y:0}};
    if(m[e.key])tryDir(m[e.key].x,m[e.key].y);
    if(e.key==='Escape')goMenu();
  };

  function place(avoid=[]){
    let pos,all=[...snake,...avoid];
    do{pos={x:Math.floor(rnd(1,cols-1)),y:Math.floor(rnd(1,rows-1))};}
    while(all.some(s=>s.x===pos.x&&s.y===pos.y));
    return pos;
  }
  food={...place(),pulse:0};

  function spawnPortals(){
    portalA={...place(),col:'#a855f7'};
    portalB={...place([portalA]),col:'#06b6d4'};
    setTimeout(()=>{portalA=null;portalB=null;},7000);
  }

  // swipe detection
  let swipeStart=null;
  document.getElementById('snakeControls').addEventListener('touchstart',e=>{
    const t=e.touches[0];swipeStart={x:t.clientX,y:t.clientY};
  },{passive:true});
  document.getElementById('snakeControls').addEventListener('touchend',e=>{
    if(!swipeStart)return;
    const t=e.changedTouches[0];
    const dx=t.clientX-swipeStart.x,dy=t.clientY-swipeStart.y;
    swipeStart=null;
    if(Math.abs(dx)<18&&Math.abs(dy)<18)return;
    if(Math.abs(dx)>Math.abs(dy)){dx>0?tryDir(1,0):tryDir(-1,0);}
    else{dy>0?tryDir(0,1):tryDir(0,-1);}
  },{passive:true});

  function loop(){
    animFrame=requestAnimationFrame(loop);tick++;
    ctx.fillStyle='#060d10';ctx.fillRect(0,0,W,H);
    ctx.strokeStyle='rgba(255,255,255,.025)';ctx.lineWidth=1;
    for(let x=0;x<W;x+=SZ){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
    for(let y=0;y<H;y+=SZ){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

    if(ghostMode>0)ghostMode--;

    if(tick%Math.floor(60/spd)===0){
      dir={...ndir};
      const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
      if(head.x<0)head.x=cols-1;if(head.x>=cols)head.x=0;
      if(head.y<0)head.y=rows-1;if(head.y>=rows)head.y=0;

      // portals
      if(portalA&&head.x===portalA.x&&head.y===portalA.y&&portalB){
        head.x=portalB.x;head.y=portalB.y;
        parts.push(...mkParts(head.x*SZ+SZ/2,head.y*SZ+SZ/2,'#a855f7',12));
        portalA=null;portalB=null;setTimeout(spawnPortals,5000);
      } else if(portalB&&head.x===portalB.x&&head.y===portalB.y&&portalA){
        head.x=portalA.x;head.y=portalA.y;
        parts.push(...mkParts(head.x*SZ+SZ/2,head.y*SZ+SZ/2,'#06b6d4',12));
        portalA=null;portalB=null;setTimeout(spawnPortals,5000);
      }

      if(!ghostMode&&snake.slice(2).some(s=>s.x===head.x&&s.y===head.y)){
        document.onkeydown=origKD;gameOver('🐍 Colisión',score);return;
      }
      snake.unshift(head);
      if(grow>0)grow--;else snake.pop();

      if(head.x===food.x&&head.y===food.y){
        parts.push(...mkParts(food.x*SZ+SZ/2,food.y*SZ+SZ/2,'#22c55e',10));
        food={...place(),pulse:0};score+=10;grow+=2;
        spd=Math.min(18,7+Math.floor(score/55));setScore(score);
        if(score%70===0&&!bonus)bonus={...place(),t:160};
        if(score%120===0&&!shrink)shrink={...place(),t:130};
        if(score%90===0&&!portalA)spawnPortals();
        if(score%200===0)ghostMode=90;
      }
      if(bonus&&head.x===bonus.x&&head.y===bonus.y){
        parts.push(...mkParts(bonus.x*SZ+SZ/2,bonus.y*SZ+SZ/2,'#fbbf24',14));
        score+=50;setScore(score);bonus=null;
      }
      if(shrink&&head.x===shrink.x&&head.y===shrink.y){
        parts.push(...mkParts(shrink.x*SZ+SZ/2,shrink.y*SZ+SZ/2,'#38bdf8',14));
        score+=30;setScore(score);if(snake.length>5)snake=snake.slice(0,snake.length-3);shrink=null;
      }
    }
    if(bonus){bonus.t--;if(bonus.t<=0)bonus=null;}
    if(shrink){shrink.t--;if(shrink.t<=0)shrink=null;}

    // portals
    [portalA,portalB].forEach(po=>{
      if(!po)return;
      const px=po.x*SZ+SZ/2,py=po.y*SZ+SZ/2;
      ctx.fillStyle=po.col;ctx.globalAlpha=.22+.14*Math.sin(tick*.12);
      ctx.beginPath();ctx.arc(px,py,SZ*.55,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
      ctx.strokeStyle=po.col;ctx.lineWidth=2;ctx.beginPath();ctx.arc(px,py,SZ*.55,0,Math.PI*2);ctx.stroke();
      ctx.font=`${SZ*.7}px system-ui`;ctx.textAlign='center';ctx.fillText('🌀',px,py+SZ*.25);
    });

    // snake body
    snake.forEach((s,i)=>{
      const t=i/snake.length;
      if(ghostMode>0)ctx.globalAlpha=.45;
      ctx.fillStyle=`hsl(${130+t*55},${88-t*38}%,${54-t*24}%)`;
      ctx.beginPath();ctx.roundRect(s.x*SZ+1,s.y*SZ+1,SZ-2,SZ-2,i===0?Math.floor(SZ*.32):Math.floor(SZ*.14));ctx.fill();
      ctx.globalAlpha=1;
      if(i===0){
        // eyes follow direction
        const ex2=dir.x*3,ey2=dir.y*3;
        const eyeSize=Math.max(2,SZ*.14);
        ctx.fillStyle='#fff';
        ctx.beginPath();ctx.arc(s.x*SZ+SZ/2-4+ey2*2,s.y*SZ+SZ/2-4+ex2*2,eyeSize,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(s.x*SZ+SZ/2+4+ey2*2,s.y*SZ+SZ/2-4+ex2*2,eyeSize,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#0f172a';
        ctx.beginPath();ctx.arc(s.x*SZ+SZ/2-4+ey2*2+ex2,s.y*SZ+SZ/2-4+ex2*2+ey2,eyeSize*.55,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(s.x*SZ+SZ/2+4+ey2*2+ex2,s.y*SZ+SZ/2-4+ex2*2+ey2,eyeSize*.55,0,Math.PI*2);ctx.fill();
      }
    });

    // food
    food.pulse+=.1;const fp=Math.sin(food.pulse)*.3+.7;
    ctx.fillStyle=`rgba(239,68,68,${fp})`;ctx.shadowBlur=16;ctx.shadowColor='#ef4444';
    ctx.beginPath();ctx.arc(food.x*SZ+SZ/2,food.y*SZ+SZ/2,SZ*.42*fp,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
    ctx.strokeStyle=`rgba(239,68,68,${fp*.4})`;ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(food.x*SZ+SZ/2,food.y*SZ+SZ/2,SZ*.6,0,Math.PI*2);ctx.stroke();

    if(bonus){
      ctx.fillStyle=`rgba(251,191,36,${.6+.4*Math.sin(tick*.15)})`;ctx.shadowBlur=22;ctx.shadowColor='#fbbf24';
      ctx.font=`${SZ*.7}px system-ui`;ctx.textAlign='center';
      ctx.fillText('⭐',bonus.x*SZ+SZ/2,bonus.y*SZ+SZ/2+SZ*.25);ctx.shadowBlur=0;
      ctx.strokeStyle='rgba(251,191,36,.5)';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(bonus.x*SZ+SZ/2,bonus.y*SZ+SZ/2,SZ*.6,-Math.PI/2,-Math.PI/2+Math.PI*2*(bonus.t/160));ctx.stroke();
    }
    if(shrink){
      ctx.font=`${SZ*.7}px system-ui`;ctx.textAlign='center';
      ctx.fillText('✂️',shrink.x*SZ+SZ/2,shrink.y*SZ+SZ/2+SZ*.25);
    }
    if(ghostMode>0){
      ctx.fillStyle=`rgba(56,189,248,${.5+.4*Math.sin(tick*.2)})`;
      ctx.font=`bold ${Math.floor(W*.035)}px system-ui`;ctx.textAlign='center';
      ctx.fillText('👻 FANTASMA',W/2,H/2-30);
    }

    drawParts(parts);
    setExtra(`🐍${snake.length} &nbsp;⚡${spd} &nbsp;${portalA?'🌀':''}`);
  }
  loop();
}

// ══════════════════════════════════════
//  G4 — LUNA 2047
// ══════════════════════════════════════
function g4(){
  const WORLD_H=40000;
  const PHASES=[
    {name:'LANZAMIENTO',alt:0,desc:'🚀 ¡Despegue!',col:'#f97316'},
    {name:'ATMÓSFERA',alt:80,desc:'☁️ Atraviesa las nubes.',col:'#38bdf8'},
    {name:'ÓRBITA BAJA',alt:400,desc:'🛸 Ajusta trayectoria.',col:'#a78bfa'},
    {name:'ESPACIO PROFUNDO',alt:1200,desc:'☄️ ¡Esquiva asteroides!',col:'#fb923c'},
    {name:'ÓRBITA LUNAR',alt:3200,desc:'🌕 Aproximación final.',col:'#e2e8f0'},
    {name:'ALUNIZAJE',alt:3800,desc:'🛬 Vel < 3 para aterrizar.',col:'#fbbf24'},
  ];

  // show luna HUD
  document.getElementById('hudScore').style.display='none';
  document.getElementById('hudExtra').style.display='none';
  document.getElementById('lunaHUD').style.display='flex';
  document.getElementById('lunaLog').style.display='block';
  repositionUI();

  // action buttons
  makeABtn('🔥','z','rgba(239,68,68,.2)','#ef4444');
  makeABtn('⚡','x','rgba(99,102,241,.2)','#6366f1');

  const logLines=[];
  function addLog(m){
    logLines.unshift(m);if(logLines.length>5)logLines.pop();
    const ll=document.getElementById('lunaLog');
    ll.innerHTML='<div style="color:#818cf8;font-weight:700;margin-bottom:4px;font-size:10px;letter-spacing:1px;">CONTROL DE MISIÓN</div>'+
      logLines.map(l=>`<div style="padding:2px 0;border-bottom:1px solid rgba(255,255,255,.05);color:rgba(255,255,255,.68);font-size:9px;">${l}</div>`).join('');
  }
  addLog('Houston: ¡Todo listo!');

  let pbTimer=0;
  function showPhase(name,desc,col){
    const pb=document.getElementById('phaseBanner');
    pb.innerHTML=`<div style="font-size:9px;color:rgba(255,255,255,.4);letter-spacing:2px;margin-bottom:3px;">NUEVA FASE</div><div style="font-size:clamp(14px,4vw,18px);font-weight:900;color:${col};">${name}</div><div style="font-size:10px;color:rgba(255,255,255,.55);margin-top:2px;">${desc}</div>`;
    pb.className='';pb.offsetWidth;pb.classList.add('show');
  }

  const R={x:W/2,y:0,vx:0,vy:0,angle:0,fuel:100,boost:3,shieldT:0,heat:0};
  const cam={y:0};
  let tick=0,timer=180,score=0,phPrev=-1,dead=false,won=false;

  const stars=[];for(let i=0;i<400;i++)stars.push({x:rnd(0,W),y:rnd(0,WORLD_H),sz:rnd(.4,2.2),b:rnd(.2,1)});
  const clouds=[];for(let i=0;i<18;i++)clouds.push({x:rnd(0,W),wy:rnd(0,650),w:rnd(70,190),h:rnd(18,48),sp:rnd(-.18,.18)});
  const moonTer=[];for(let i=0;i<=50;i++)moonTer.push({x:(i/50)*W,y:WORLD_H+rnd(0,90)});
  const asteroids=[];for(let i=0;i<60;i++)asteroids.push({x:rnd(0,W),wy:rnd(1400,WORLD_H-900),vx:rnd(-.55,.55),vy:rnd(-.35,.35),r:rnd(7,26),rot:rnd(0,6.28),rotV:rnd(-.022,.022)});
  const fuelPods=[];for(let i=0;i<14;i++)fuelPods.push({x:rnd(35,W-35),wy:rnd(150,WORLD_H-500),alive:true,pulse:rnd(0,6.28)});
  const boostPods=[];for(let i=0;i<4;i++)boostPods.push({x:rnd(35,W-35),wy:rnd(700,WORLD_H-700),alive:true,pulse:rnd(0,6.28)});
  const parts=[],exhaust=[];

  function wts(wy,sc2){return H*.68-(wy-cam.y)*sc2;}
  function getScale(alt){return Math.max(.04,Math.min(.18,.18-alt*.00003));}
  function getPhIdx(alt){for(let i=PHASES.length-1;i>=0;i--)if(alt>=PHASES[i].alt)return i;return 0;}

  function lunaEnd(title,sub,ok){
    cleanupLuna();
    const pts=Math.floor(score);
    gameOver(title,pts,ok?`🎉 ${sub} | Pts: ${pts}`:sub);
  }

  function loop(){
    animFrame=requestAnimationFrame(loop);
    const alt=R.y/10,sc2=getScale(alt);
    cam.y+=(R.y-H*.32/sc2-cam.y)*.055;
    ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);

    // sky
    const skyA=Math.max(0,1-alt/110);
    if(skyA>0){
      const sky=ctx.createLinearGradient(0,0,0,H);
      sky.addColorStop(0,`rgba(2,18,70,${skyA})`);
      sky.addColorStop(.55,`rgba(14,72,160,${skyA})`);
      sky.addColorStop(1,`rgba(90,145,220,${skyA})`);
      ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);
    }

    // stars
    for(const s of stars){
      const sy=wts(s.wy,sc2);if(sy<-8||sy>H+8)continue;
      const vis=Math.min(1,(alt-45)/75)*s.b;if(vis<=0)continue;
      ctx.globalAlpha=vis;ctx.fillStyle='#fff';
      ctx.beginPath();ctx.arc(s.x,sy,s.sz,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;

    // Earth
    {
      const eSY=wts(0,sc2);
      if(eSY<H+300){
        const atG=ctx.createRadialGradient(W/2,eSY+W*1.2,W*1.0,W/2,eSY+W*1.2,W*1.6);
        atG.addColorStop(0,'rgba(40,100,255,.12)');atG.addColorStop(1,'transparent');
        ctx.fillStyle=atG;ctx.fillRect(0,0,W,H);
        ctx.fillStyle='#1e3a8a';ctx.beginPath();ctx.arc(W/2,eSY+W*1.2,W*1.22,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#166534';
        ctx.beginPath();ctx.ellipse(W/2-55,eSY+W*1.13,68,44,.3,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.ellipse(W/2+95,eSY+W*1.22,50,34,-.2,0,Math.PI*2);ctx.fill();
        const rimG=ctx.createRadialGradient(W/2,eSY+W*1.2,W*1.19,W/2,eSY+W*1.2,W*1.28);
        rimG.addColorStop(0,'rgba(100,180,255,0)');rimG.addColorStop(.5,'rgba(100,180,255,.25)');rimG.addColorStop(1,'transparent');
        ctx.fillStyle=rimG;ctx.beginPath();ctx.arc(W/2,eSY+W*1.2,W*1.28,0,Math.PI*2);ctx.fill();
      }
    }

    // Moon
    {
      const mSY=wts(WORLD_H,sc2);
      ctx.fillStyle='#d1d5db';ctx.shadowBlur=alt>3000?70:12;ctx.shadowColor='rgba(255,255,255,.4)';
      ctx.beginPath();ctx.arc(W/2,mSY,70,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
      ctx.fillStyle='#9ca3af';
      [[-.3,-.25,8],[.2,-.1,6],[-.05,.35,4],[.4,.2,5],[-.2,.15,3]].forEach(([dx,dy,r])=>{
        ctx.beginPath();ctx.arc(W/2+dx*70,mSY+dy*70,r,0,Math.PI*2);ctx.fill();
      });
      const padSY=wts(WORLD_H-4,sc2);
      if(Math.abs(padSY-H)<350){
        ctx.fillStyle='rgba(251,191,36,.55)';ctx.fillRect(W/2-32,padSY,64,6);
        ctx.fillStyle='#fbbf24';for(let k=0;k<5;k++)ctx.fillRect(W/2-32+k*16,padSY-14,2,14);
        ctx.fillStyle='rgba(251,191,36,.2)';ctx.beginPath();ctx.arc(W/2,padSY+3,44,0,Math.PI*2);ctx.fill();
      }
      if(Math.abs(mSY-H)<320){
        ctx.fillStyle='#9ca3af';ctx.beginPath();ctx.moveTo(0,mSY);
        moonTer.forEach(t=>ctx.lineTo(t.x,wts(t.y,sc2)));
        ctx.lineTo(W,H+20);ctx.lineTo(0,H+20);ctx.closePath();ctx.fill();
      }
    }

    // clouds
    if(alt<190){
      const ca=Math.max(0,1-alt/150);
      clouds.forEach(cl=>{
        cl.x+=cl.sp;if(cl.x>W+cl.w)cl.x=-cl.w;if(cl.x<-cl.w)cl.x=W+cl.w;
        const sy=wts(cl.wy,sc2);if(sy<-60||sy>H+60)return;
        ctx.globalAlpha=.55*ca;ctx.fillStyle='rgba(170,195,255,.5)';
        ctx.beginPath();ctx.ellipse(cl.x,sy,cl.w,cl.h,0,0,Math.PI*2);ctx.fill();
      });
      ctx.globalAlpha=1;
    }

    // fuel / boost pods
    fuelPods.forEach(pod=>{
      if(!pod.alive)return;
      const sy=wts(pod.wy,sc2);if(sy<-30||sy>H+30)return;
      pod.pulse+=.08;const ps=Math.sin(pod.pulse)*.3+.7;
      ctx.fillStyle=`rgba(34,197,94,${ps})`;ctx.shadowBlur=12;ctx.shadowColor='#22c55e';
      ctx.beginPath();ctx.arc(pod.x,sy,12,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
      ctx.font='11px system-ui';ctx.textAlign='center';ctx.fillText('⛽',pod.x,sy+4);
    });
    boostPods.forEach(pod=>{
      if(!pod.alive)return;
      const sy=wts(pod.wy,sc2);if(sy<-30||sy>H+30)return;
      pod.pulse+=.1;const ps=Math.sin(pod.pulse)*.3+.7;
      ctx.fillStyle=`rgba(99,102,241,${ps})`;ctx.shadowBlur=14;ctx.shadowColor='#6366f1';
      ctx.beginPath();ctx.arc(pod.x,sy,12,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
      ctx.font='11px system-ui';ctx.textAlign='center';ctx.fillText('⚡',pod.x,sy+4);
    });

    // asteroids
    asteroids.forEach(a=>{
      const sy=wts(a.wy,sc2);if(sy<-80||sy>H+80)return;
      a.x+=a.vx;a.wy+=a.vy;a.rot+=a.rotV;
      if(a.x<-a.r)a.x=W+a.r;if(a.x>W+a.r)a.x=-a.r;
      ctx.save();ctx.translate(a.x,sy);ctx.rotate(a.rot);
      ctx.fillStyle='#52525b';ctx.strokeStyle='#a1a1aa';ctx.lineWidth=1;
      ctx.beginPath();
      for(let k=0;k<7;k++){const an=(k/7)*Math.PI*2,rd=a.r*(.7+Math.sin(k*2.1)*.3);k===0?ctx.moveTo(Math.cos(an)*rd,Math.sin(an)*rd):ctx.lineTo(Math.cos(an)*rd,Math.sin(an)*rd);}
      ctx.closePath();ctx.fill();ctx.stroke();
      ctx.restore();
    });

    // physics
    tick++;
    if(!dead&&!won){
      // joystick left/right = rotate; joystick up = thrust (if not using dedicated button)
      const jx=axisX();
      R.angle+=jx*.022;
      R.angle=Math.max(-Math.PI*.88,Math.min(Math.PI*.88,R.angle));

      const thrust=(btnHeld('z')||btnHeld('w')||keys['arrowup']||keys[' '])&&R.fuel>0;
      const boost=(btnHeld('x')||btnHeld('b'))&&R.fuel>0&&R.boost>0;

      const grav=alt<100?.025:alt<1000?.018:alt<3000?.009:.004;
      R.vy-=grav;

      if(thrust){
        const tp=boost?.52:.15;
        R.vx+=Math.sin(R.angle)*tp;R.vy+=Math.cos(R.angle)*tp;
        R.fuel=Math.max(0,R.fuel-(boost?.46:.1));
        if(boost&&R.fuel>0)R.boost=Math.max(0,R.boost-.018);
        const ex2=R.x+Math.sin(R.angle+Math.PI)*20;
        const ey2=wts(R.y,sc2)+Math.cos(R.angle+Math.PI)*22;
        exhaust.push({x:ex2,y:ey2,vx:Math.sin(R.angle+Math.PI)*rnd(2,5)+rnd(-1,1),vy:-Math.cos(R.angle+Math.PI)*rnd(2,5)+rnd(-1,1),life:1,big:boost});
        R.heat=Math.min(1,R.heat+.011);
      } else R.heat=Math.max(0,R.heat-.005);

      if(alt<150){R.vx*=.989;R.vy*=.989;}else{R.vx*=.9992;R.vy*=.9992;}
      const spd2=Math.hypot(R.vx,R.vy);if(spd2>13){const f=13/spd2;R.vx*=f;R.vy*=f;}
      R.x+=R.vx;R.y+=R.vy;
      if(R.x<0)R.x=W;if(R.x>W)R.x=0;
      if(R.y<-40){dead=true;lunaEnd('💥 IMPACTO','Chocaste contra la Tierra',false);return;}
      if(R.y>=WORLD_H-10){
        const sp3=Math.hypot(R.vx,R.vy);
        if(sp3<3){won=true;lunaEnd('🌙 ¡ALUNIZAJE!','Fuel: '+Math.floor(R.fuel)+'%',true);}
        else{dead=true;lunaEnd('💥 IMPACTO LUNAR',`Demasiado rápido (${sp3.toFixed(1)} m/s)`,false);}
        return;
      }

      fuelPods.forEach(pod=>{
        if(!pod.alive)return;
        const sy=wts(pod.wy,sc2),ry=wts(R.y,sc2);
        if(Math.hypot(R.x-pod.x,ry-sy)<26){pod.alive=false;R.fuel=Math.min(100,R.fuel+25);score+=150;addLog('⛽ +25% combustible');}
      });
      boostPods.forEach(pod=>{
        if(!pod.alive)return;
        const sy=wts(pod.wy,sc2),ry=wts(R.y,sc2);
        if(Math.hypot(R.x-pod.x,ry-sy)<26){pod.alive=false;R.boost=Math.min(5,R.boost+2);score+=300;addLog('⚡ Boost x2 recargado');}
      });

      for(let i=asteroids.length-1;i>=0;i--){
        const a=asteroids[i];const sy=wts(a.wy,sc2),ry=wts(R.y,sc2);
        if(Math.hypot(R.x-a.x,ry-sy)<a.r+14){
          if(R.shieldT>0){parts.push(...mkParts(a.x,sy,'#f97316',18));asteroids.splice(i,1);score+=100;addLog('🛡 Escudo absorbió impacto');}
          else{parts.push(...mkParts(R.x,ry,'#fff',28));dead=true;lunaEnd('☄️ ASTEROIDE','Destruido por asteroide',false);return;}
        }
      }
      if(R.shieldT>0)R.shieldT--;

      const ph=getPhIdx(alt);
      if(ph!==phPrev){phPrev=ph;showPhase(PHASES[ph].name,PHASES[ph].desc,PHASES[ph].col);addLog('📍 '+PHASES[ph].name);score+=200;}
      if(tick%60===0&&timer>0){timer--;score+=12;if(timer<=0&&!won){dead=true;lunaEnd('⏱️ TIEMPO AGOTADO','La misión tardó demasiado',false);return;}}
      if(R.vy>2)score+=R.vy*.015;
    }

    // exhaust
    for(let i=exhaust.length-1;i>=0;i--){
      const e=exhaust[i];e.x+=e.vx;e.y+=e.vy;e.life-=e.big?.038:.056;
      if(e.life<=0){exhaust.splice(i,1);continue;}
      ctx.globalAlpha=e.life*.78;
      const g=ctx.createRadialGradient(e.x,e.y,0,e.x,e.y,e.big?20:11);
      g.addColorStop(0,'#fbbf24');g.addColorStop(.5,'#ef4444');g.addColorStop(1,'transparent');
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(e.x,e.y,e.big?20:11,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;

    // rocket
    {
      const rx=R.x,ry=wts(R.y,sc2);
      ctx.save();ctx.translate(rx,ry);ctx.rotate(R.angle);
      ctx.fillStyle=R.heat>.55?`rgb(${Math.floor(255*R.heat)},${Math.floor(100*(1-R.heat))},40)`:'#f1f5f9';
      ctx.beginPath();ctx.roundRect(-9,-24,18,44,4);ctx.fill();
      ctx.fillStyle='#a855f7';ctx.beginPath();ctx.moveTo(0,-36);ctx.lineTo(9,-24);ctx.lineTo(-9,-24);ctx.closePath();ctx.fill();
      ctx.fillStyle='#38bdf8';ctx.beginPath();ctx.ellipse(0,-9,5.5,7.5,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,.42)';ctx.beginPath();ctx.ellipse(-2,-11,2.5,3.5,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#64748b';
      ctx.beginPath();ctx.moveTo(-9,14);ctx.lineTo(-21,30);ctx.lineTo(-9,26);ctx.closePath();ctx.fill();
      ctx.beginPath();ctx.moveTo(9,14);ctx.lineTo(21,30);ctx.lineTo(9,26);ctx.closePath();ctx.fill();
      ctx.fillStyle='#334155';ctx.beginPath();ctx.roundRect(-7,20,14,9,2);ctx.fill();
      if(R.shieldT>0){ctx.strokeStyle=`rgba(100,200,255,${R.shieldT/120})`;ctx.lineWidth=3;ctx.beginPath();ctx.arc(0,0,34,0,Math.PI*2);ctx.stroke();}
      ctx.restore();
    }

    drawParts(parts);

    // minimap
    {
      const mw=46,mh=130,mx=W-mw-8,my=H*.12;
      ctx.fillStyle='rgba(0,0,0,.62)';ctx.strokeStyle='rgba(255,255,255,.16)';ctx.lineWidth=1;
      ctx.beginPath();ctx.roundRect(mx,my,mw,mh,8);ctx.fill();ctx.stroke();
      ctx.fillStyle='#1e3a8a';ctx.beginPath();ctx.arc(mx+mw/2,my+mh-7,8,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#d1d5db';ctx.beginPath();ctx.arc(mx+mw/2,my+8,6,0,Math.PI*2);ctx.fill();
      const prog=Math.max(0,Math.min(1,R.y/WORLD_H));
      const rdy=my+mh-8-prog*(mh-16);
      ctx.fillStyle='#a855f7';ctx.shadowBlur=5;ctx.shadowColor='#a855f7';
      ctx.beginPath();ctx.arc(mx+mw/2,rdy,4,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
      ctx.fillStyle='rgba(255,255,255,.26)';ctx.font='8px system-ui';ctx.textAlign='center';
      ctx.fillText('🌙',mx+mw/2,my+11);ctx.fillText('🌍',mx+mw/2,my+mh-1);
    }

    // HUD update
    const alt2=R.y/10,ph2=getPhIdx(alt2);
    document.getElementById('lFuel').textContent=Math.floor(R.fuel)+'%';
    const fb=document.getElementById('lFuelBar');
    fb.style.width=R.fuel+'%';fb.style.background=R.fuel>50?'#22c55e':R.fuel>25?'#fbbf24':'#ef4444';
    document.getElementById('lAlt').textContent=alt2<100?alt2.toFixed(1)+' km':Math.floor(alt2)+' km';
    document.getElementById('lSpd').textContent=Math.hypot(R.vx,R.vy).toFixed(1);
    const s2=timer%60,m2=Math.floor(timer/60);
    const lT=document.getElementById('lTime');
    lT.textContent=(timer<=30?'⚠️':'')+m2+':'+(s2<10?'0':'')+s2;
    lT.style.color=timer<=30?'#ef4444':'#fff';
    const lP=document.getElementById('lPhase');
    lP.textContent=PHASES[ph2].name;lP.style.color=PHASES[ph2].col;
    document.getElementById('lScore').textContent=Math.floor(score);

    if(R.fuel<15&&!dead&&!won){
      ctx.fillStyle=`rgba(239,68,68,${.4+.4*Math.sin(tick*.14)})`;
      ctx.font=`bold ${Math.floor(W*.032)}px system-ui`;ctx.textAlign='center';
      ctx.fillText('⚠️ COMBUSTIBLE CRÍTICO',W/2,H-12);
    }
  }
  loop();
}

// Init
resize();
</script>
